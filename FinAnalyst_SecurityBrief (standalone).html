  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

002Fdiv>\n    <\u002Fdiv>\n    <h1>Справка по <em>безопасности<\u002Fem><\u002Fh1>\n    <div class=\"sub\">Оценка рисков информационной и экономической безопасности одностраничного веб‑приложения финансового анализа FARM‑Score.<\u002Fdiv>\n    <div class=\"verdict\">\n        <div class=\"vbadge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#16a34a\" stroke-width=\"2.5\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>Данные не покидают компьютер<\u002Fdiv>\n        <div class=\"vbadge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#16a34a\" stroke-width=\"2.5\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>Источник — публичная отчётность<\u002Fdiv>\n        <div class=\"vbadge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#16a34a\" stroke-width=\"2.5\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>Офлайн‑версия доступна<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"meta\">\n        <div><div class=\"k\">Приложение<\u002Fdiv><div class=\"val\">FIN ANALYST v2.4.8<\u002Fdiv><\u002Fdiv>\n        <div><div class=\"k\">Документ<\u002Fdiv><div class=\"val\">Security Brief<\u002Fdiv><\u002Fdiv>\n        <div><div class=\"k\">Дата<\u002Fdiv><div class=\"val\">Июнь 2026<\u002Fdiv><\u002Fdiv>\n        <div><div class=\"k\">Аудитория<\u002Fdiv><div class=\"val\">ИБ · Руководство<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ CONTENT ============ -->\n<div class=\"page page-break\">\n\n<section>\n    <span class=\"sec-num\">РЕЗЮМЕ<\u002Fspan>\n    <h2>Главное в одном абзаце<\u002Fh2>\n    <p class=\"lead\">FIN ANALYST — это <strong>один HTML‑файл<\u002Fstrong>, который выполняется целиком в браузере пользователя. Загруженная отчётность обрабатывается локально и <strong>никуда не передаётся<\u002Fstrong>: нет сервера, нет базы данных, нет облака. Исходные данные — <strong>публичная бухгалтерская отчётность<\u002Fstrong> из ГИР БО, поэтому риска утечки конфиденциальной информации нет в принципе. Единственная внешняя зависимость онлайн‑версии — загрузка библиотек и шрифтов из CDN; она устраняется автономной (standalone) версией, которая уже подготовлена и предоставляется по запросу.<\u002Fp>\n    <div class=\"ok\"><span class=\"tag\">Итоговая оценка<\u002Fspan>Совокупный риск — <strong>низкий<\u002Fstrong>. Приложение архитектурно не способно «слить» данные: ему некуда их отправлять. Остаточные риски связаны только с доступностью CDN и носителем файла, и закрываются автономной версией внутри корпоративного периметра.<\u002Fdiv>\n<\u002Fsection>\n\n<section>\n    <span class=\"sec-num\">01 · АРХИТЕКТУРА<\u002Fspan>\n    <h2>Где выполняются вычисления<\u002Fh2>\n    <p>Приложение построено по модели <strong>client‑side only<\u002Fstrong> («толстый клиент без сервера»). Весь код — разметка, стили, логика расчётов FARM‑Score — содержится в одном файле <code>FinAnalyst_v2.4.8.html<\u002Fcode> и исполняется движком браузера на компьютере пользователя.<\u002Fp>\n    <ul>\n        <li><strong>Нет бэкенда.<\u002Fstrong> Не существует серверной части, API или эндпоинтов, куда отправлялись бы данные. Файл можно открыть даже двойным кликом с локального диска (<code>file://<\u002Fcode>).<\u002Fli>\n        <li><strong>Нет хранилища на стороне сервера.<\u002Fstrong> Загруженные таблицы существуют только в оперативной памяти вкладки и стираются при её закрытии.<\u002Fli>\n        <li><strong>Чтение файлов — локальное.<\u002Fstrong> Excel‑выгрузки разбираются прямо в браузере (библиотека <code>xlsx<\u002Fcode>); zip‑архивы ГИР БО распаковываются на лету (<code>JSZip<\u002Fcode>). Файл не выгружается на сторонний сервис.<\u002Fli>\n    <\u002Ful>\n    <div class=\"note\"><span class=\"tag\">Проверяемый факт<\u002Fspan>Откройте автономную версию, затем отключите сеть (режим «в самолёте») и загрузите отчётность — расчёт пройдёт полностью. Это доказывает, что вычисления не зависят от сервера.<\u002Fdiv>\n<\u002Fsection>\n\n<section>\n    <span class=\"sec-num\">02 · ДАННЫЕ<\u002Fspan>\n    <h2>Какие данные обрабатываются и их статус<\u002Fh2>\n    <p>Вход приложения — формы бухгалтерской отчётности (Бухгалтерский баланс Ф1, Отчёт о финансовых результатах Ф2, Отчёт о движении денежных средств Ф4) в формате выгрузки <strong>ГИР БО<\u002Fstrong> (Государственный информационный ресурс бухгалтерской отчётности, ФНС России).<\u002Fp>\n    <table>\n        <thead><tr><th style=\"width:34%\">Характеристика<\u002Fth><th>Значение<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n            <tr><td>Статус данных<\u002Ftd><td><span class=\"risk-low\">Публичные<\u002Fspan> — годовая отчётность раскрывается в ГИР БО и доступна любому лицу<\u002Ftd><\u002Ftr>\n            <tr><td>Конфиденциальность<\u002Ftd><td>Отсутствует: коммерческой тайны и персональных данных формы не содержат<\u002Ftd><\u002Ftr>\n            <tr><td>Где хранятся в работе<\u002Ftd><td>Только в оперативной памяти вкладки (RAM), до её закрытия<\u002Ftd><\u002Ftr>\n            <tr><td>Что сохраняется на диск<\u002Ftd><td>Ничего автоматически. По желанию — экспорт профиля (JSON) и печать в PDF, инициируются пользователем<\u002Ftd><\u002Ftr>\n            <tr><td>localStorage браузера<\u002Ftd><td>Только пользовательские <strong>профили весов<\u002Fstrong> и состояние интерфейса. Сама отчётность в localStorage не пишется<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n    <\u002Ftable>\n    <div class=\"ok\"><span class=\"tag\">Вывод по конфиденциальности<\u002Fspan>Так как исходные данные публичны, даже гипотетическая их передача не образует утечки охраняемой законом тайны. Это снимает основной класс рисков ИБ ещё на уровне постановки задачи.<\u002Fdiv>\n<\u002Fsection>\n\n<section>\n    <span class=\"sec-num\">03 · ВНЕШНИЕ ЗАВИСИМОСТИ<\u002Fspan>\n    <h2>Что и откуда загружается онлайн<\u002Fh2>\n    <p>Онлайн‑версия подгружает три внешних ресурса с публичных CDN. <strong>Это исходящие запросы за кодом библиотек, а не за вашими данными<\u002Fstrong> — наружу уходит только факт запроса самого файла библиотеки.<\u002Fp>\n    <table>\n        <thead><tr><th style=\"width:26%\">Ресурс<\u002Fth><th style=\"width:30%\">Источник<\u002Fth><th>Назначение<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n            <tr><td><code>xlsx<\u002Fcode> 0.18.5<\u002Ftd><td>cdn.jsdelivr.net<\u002Ftd><td>Чтение Excel‑файлов<\u002Ftd><\u002Ftr>\n            <tr><td><code>JSZip<\u002Fcode> 3.10.1<\u002Ftd><td>cdn.jsdelivr.net<\u002Ftd><td>Распаковка zip‑архивов ГИР БО<\u002Ftd><\u002Ftr>\n            <tr><td>Шрифты Manrope / JetBrains&nbsp;Mono<\u002Ftd><td>fonts.googleapis.com<\u002Ftd><td>Типографика интерфейса<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n    <\u002Ftable>\n    <h4>Защита от подмены кода (SRI)<\u002Fh4>\n    <p>Подключения библиотек снабжены атрибутом <code>integrity<\u002Fcode> с хешем <code>sha‑384<\u002Fcode> (Subresource Integrity). Браузер сверяет контрольную сумму скачанного файла: если CDN скомпрометирован и код подменён — браузер <strong>откажется выполнять<\u002Fstrong> изменённый скрипт. Это закрывает риск «отравленной» зависимости.<\u002Fp>\n    <div class=\"warn\"><span class=\"tag\">Остаточный риск — доступность<\u002Fspan>Если CDN недоступен (нет интернета, ресурс заблокирован в периметре), онлайн‑версия не загрузит библиотеку. Это <strong>отказ в работе, а не утечка<\u002Fstrong>. Выводится понятное сообщение, а радикальное решение — автономная версия (раздел 05).<\u002Fdiv>\n<\u002Fsection>\n\n<section>\n    <span class=\"sec-num\">04 · МЕТОДИКА И ЕЁ ЦЕЛОСТНОСТЬ<\u002Fspan>\n    <h2>Защита самой методики FARM‑Score<\u002Fh2>\n    <p>Разделы 01–03 рассматривали безопасность <strong>данных<\u002Fstrong>. Но ключевая ценность продукта — не данные (они публичны), а <strong>сама методика FARM‑Score<\u002Fstrong>: формулы, веса категорий, пороги грейдов A–F и правила‑исключения. Так как приложение целиком исполняется в браузере, его код в принципе доступен для просмотра. С этим связаны два самостоятельных риска, которые мы обозначаем честно.<\u002Fp>\n    <h4>Риск 1 — копирование методики (интеллектуальная собственность)<\u002Fh4>\n    <p>Любой, кто получил файл, может изучить логику расчёта и воспроизвести её в стороннем продукте. Для клиентского веб‑приложения это неустранимо технически: исходный код по своей природе доступен браузеру, а значит и читателю.<\u002Fp>\n    <h4>Риск 2 — несанкционированное изменение алгоритма (целостность)<\u002Fh4>\n    <p>В копии файла можно изменить формулы или веса и выдавать результат за «официальный» FARM‑Score. Это искажает оценки и наносит репутационный ущерб правообладателю, поскольку под одним названием начинают ходить разные методики.<\u002Fp>\n    <h4>Принятые и рекомендуемые меры<\u002Fh4>\n    <ul>\n        <li><strong>Юридическая защита.<\u002Fstrong> В исходный код файла встроено уведомление об авторских правах (© Gadalov Yuriy / Gadalov BI) и прямой запрет на копирование, модификацию и распространение методики без письменного разрешения. Это фиксирует авторство и переводит несанкционированное использование в правовую плоскость.<\u002Fli>\n        <li><strong>Фиксация контрольной суммы версии.<\u002Fstrong> Для каждой выпущенной версии файла вычисляется и хранится её хеш <code>SHA‑256<\u002Fcode>. Это позволяет в любой момент доказать, что конкретный файл — подлинный и неизменённый, либо обнаружить факт правки.<\u002Fli>\n    <\u002Ful>\n    <div class=\"note\"><span class=\"tag\">Как зафиксировать хеш<\u002Fspan>Хеш версии считается одной командой PowerShell (Windows):<br><code>Get-FileHash .\\FinAnalyst_v2.4.8.html -Algorithm SHA256<\u002Fcode><br>Полученное значение хранится в реестре версий (или у ответственного за сопровождение) и сверяется при получении файла из недоверенного источника.<\u002Fdiv>\n    <div class=\"warn\"><span class=\"tag\">Честное ограничение<\u002Fspan>Полностью запретить просмотр клиентского кода технически невозможно — это свойство любого браузерного приложения. Поэтому защита методики строится не на «запрете чтения», а на <strong>юридическом закреплении прав<\u002Fstrong> и на <strong>возможности доказать подлинность<\u002Fstrong> конкретной версии по её хешу.<\u002Fdiv>\n<\u002Fsection>\n\n<section>\n    <span class=\"sec-num\">05 · МАТРИЦА РИСКОВ<\u002Fspan>\n    <h2>Риски и меры снижения<\u002Fh2>\n    <table>\n        <thead><tr><th style=\"width:26%\">Риск<\u002Fth><th style=\"width:13%\">Вероят.<\u002Fth><th style=\"width:15%\">Последствие<\u002Fth><th>Мера снижения<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n            <tr><td>Утечка конфиденциальных данных<\u002Ftd><td><span class=\"risk-low\">Нет<\u002Fspan><\u002Ftd><td>—<\u002Ftd><td>Архитектурно невозможна: некуда отправлять + данные публичны<\u002Ftd><\u002Ftr>\n            <tr><td>Перехват «в канале»<\u002Ftd><td><span class=\"risk-low\">Нет<\u002Fspan><\u002Ftd><td>—<\u002Ftd><td>Данные не передаются по сети вообще<\u002Ftd><\u002Ftr>\n            <tr><td>Подмена кода библиотеки на CDN<\u002Ftd><td><span class=\"risk-low\">Низкая<\u002Fspan><\u002Ftd><td>Высокое<\u002Ftd><td>SRI‑хеши <code>sha‑384<\u002Fcode>; автономная версия без CDN<\u002Ftd><\u002Ftr>\n            <tr><td>Недоступность CDN / нет сети<\u002Ftd><td><span class=\"risk-mid\">Средняя<\u002Fspan><\u002Ftd><td>Отказ работы<\u002Ftd><td>Автономная (standalone) версия — работает офлайн<\u002Ftd><\u002Ftr>\n            <tr><td>Подмена самого HTML‑файла<\u002Ftd><td><span class=\"risk-low\">Низкая<\u002Fspan><\u002Ftd><td>Высокое<\u002Ftd><td>Хранение в доверенной папке/репозитории, контроль версий, хеш файла<\u002Ftd><\u002Ftr>\n            <tr><td>Копирование методики (IP)<\u002Ftd><td><span class=\"risk-mid\">Средняя<\u002Fspan><\u002Ftd><td>Среднее<\u002Ftd><td>Уведомление об авторских правах в коде; запрет копирования без разрешения<\u002Ftd><\u002Ftr>\n            <tr><td>Изменение алгоритма «под чужим именем»<\u002Ftd><td><span class=\"risk-low\">Низкая<\u002Fspan><\u002Ftd><td>Среднее<\u002Ftd><td>Фиксация хеша эталонной версии (<code>Get-FileHash<\u002Fcode>) и сверка подлинности<\u002Ftd><\u002Ftr>\n            <tr><td>Вредонос во «входном» Excel<\u002Ftd><td><span class=\"risk-low\">Низкая<\u002Fspan><\u002Ftd><td>Среднее<\u002Ftd><td>Парсинг в песочнице браузера; макросы не исполняются; вывод экранируется<\u002Ftd><\u002Ftr>\n            <tr><td>Vendor lock‑in / прекращение поддержки<\u002Ftd><td><span class=\"risk-low\">Низкая<\u002Fspan><\u002Ftd><td>Низкое<\u002Ftd><td>Открытый одиночный файл, без подписок и облака; полностью автономен<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n    <\u002Ftable>\n<\u002Fsection>\n\n<section>\n    <span class=\"sec-num\">06 · АВТОНОМНАЯ ВЕРСИЯ<\u002Fspan>\n    <h2>Standalone: устранение зависимости от сети<\u002Fh2>\n    <p>Для эксплуатации в закрытом контуре или без интернета подготовлена <strong>автономная (standalone) версия приложения<\u002Fstrong> — отдельный файл, где все библиотеки и шрифты «вшиты» внутрь. Такой файл не делает ни одного внешнего запроса. Версия <strong>уже собрана и предоставляется по запросу<\u002Fstrong> (у владельца проекта / ответственного за сопровождение).<\u002Fp>\n    <table>\n        <thead><tr><th style=\"width:32%\">Параметр<\u002Fth><th>Онлайн‑версия<\u002Fth><th>Автономная версия<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n            <tr><td>Внешние запросы<\u002Ftd><td>3 (CDN + шрифты)<\u002Ftd><td><span class=\"risk-low\">0 — полностью офлайн<\u002Fspan><\u002Ftd><\u002Ftr>\n            <tr><td>Работа без интернета<\u002Ftd><td>Нет<\u002Ftd><td><span class=\"risk-low\">Да<\u002Fspan><\u002Ftd><\u002Ftr>\n            <tr><td>Размер файла<\u002Ftd><td>≈ 0,4 МБ<\u002Ftd><td>≈ 1,5–2 МБ (с библиотеками)<\u002Ftd><\u002Ftr>\n            <tr><td>Статус готовности<\u002Ftd><td>—<\u002Ftd><td><span class=\"risk-low\">Готова<\u002Fspan>, предоставляется по запросу<\u002Ftd><\u002Ftr>\n            <tr><td>Где хранить<\u002Ftd><td colspan=\"2\">Корпоративный файловый ресурс / репозиторий внутри периметра<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n    <\u002Ftable>\n    <div class=\"note\"><span class=\"tag\">Доступно сейчас<\u002Fspan>Автономные версии уже собраны для самого приложения (<code>FinAnalyst … (standalone).html<\u002Fcode>), а также для руководства пользователя и презентации продукта. Файл автономного приложения предоставляется по запросу и готов к размещению во внутреннем ресурсе.<\u002Fdiv>\n    <div class=\"ok\"><span class=\"tag\">Рекомендация для ИБ<\u002Fspan>Для строгого режима: использовать <strong>автономную версию<\u002Fstrong> во внутреннем ресурсе, открывать в штатном браузере (Chrome/Edge). В этом режиме приложение не имеет ни одного сетевого взаимодействия — расчёты идут изолированно на рабочем месте.<\u002Fdiv>\n<\u002Fsection>\n\n<section>\n    <span class=\"sec-num\">07 · ЭКОНОМИЧЕСКАЯ БЕЗОПАСНОСТЬ<\u002Fspan>\n    <h2>Операционные и стоимостные аспекты<\u002Fh2>\n    <ul>\n        <li><strong>Нет регулярных платежей.<\u002Fstrong> Отсутствуют лицензии, подписки, плата за облако или за количество пользователей.<\u002Fli>\n        <li><strong>Нет внешнего поставщика‑посредника.<\u002Fstrong> Данные не проходят через сторонний SaaS — нет зависимости от чужой доступности, тарифов и политики.<\u002Fli>\n        <li><strong>Простое сопровождение и аудит.<\u002Fstrong> Один файл легко версионировать, архивировать, передавать и проверять; есть техническая документация кода.<\u002Fli>\n        <li><strong>Низкий риск «bus‑factor».<\u002Fstrong> Стек — стандартный HTML/JS без экзотических фреймворков; поддерживать может любой веб‑разработчик по техдокументации.<\u002Fli>\n        <li><strong>Воспроизводимость.<\u002Fstrong> Результат расчёта детерминирован и зависит только от входных данных и выбранного профиля — его можно перепроверить вручную по методике FARM‑Score.<\u002Fli>\n    <\u002Ful>\n<\u002Fsection>\n\n<section>\n    <span class=\"sec-num\">08 · РЕКОМЕНДАЦИИ<\u002Fspan>\n    <h2>Практические меры для эксплуатации<\u002Fh2>\n    <ol>\n        <li><strong>Использовать автономную версию<\u002Fstrong> для рабочих мест без устойчивого интернета или в закрытом контуре — это убирает все внешние запросы.<\u002Fli>\n        <li><strong>Хранить файл в доверенном месте<\u002Fstrong> (корпоративный сетевой ресурс или внутренний репозиторий) с контролем версий и, при необходимости, фиксацией хеша файла.<\u002Fli>\n        <li><strong>Открывать в поддерживаемом браузере<\u002Fstrong> (Chrome/Edge актуальной версии) — это обеспечивает работу песочницы и проверку SRI.<\u002Fli>\n        <li><strong>Не загружать непубличные данные без необходимости.<\u002Fstrong> Если всё же требуется — помнить, что они не покинут ПК, но к рабочему месту применяются обычные корпоративные политики (антивирус, контроль доступа).<\u002Fli>\n        <li><strong>Периодически обновлять<\u002Fstrong> приложение до актуальной версии, чтобы получать исправления и поддержку.<\u002Fli>\n    <\u002Fol>\n    <div class=\"ok\"><span class=\"tag\">Итог<\u002Fspan>FIN ANALYST безопасен для применения на публичной отчётности: данные не выходят за пределы компьютера, конфиденциальной информации не обрабатывается, а зависимость от интернета снимается автономной сборкой. Совокупный уровень риска — <strong>низкий<\u002Fstrong>.<\u002Fdiv>\n<\u002Fsection>\n\n<hr>\n<p class=\"small\">Документ подготовлен как обзорная справка для служб информационной и экономической безопасности. Носит пояснительный характер и не заменяет внутренние регламенты организации. · FIN ANALYST v2.4.8 · FARM‑Score<\u002Fp>\n\n<\u002Fdiv>\n\n\n\n<\u002Fbody><\u002Fhtml>"
